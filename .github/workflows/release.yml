name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        shell: bash
        run: |
          expected_tag="v$(python3 -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('Cargo.toml').read_text(encoding='utf-8'))['workspace']['package']['version'])")"

          if [ "${GITHUB_REF_NAME}" != "$expected_tag" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match workspace version ${expected_tag}" >&2
            exit 1
          fi

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Test execmanager-cli
        run: cargo test -p execmanager-cli -- --nocapture

      - name: Test workspace
        run: cargo test --workspace --all-targets -- --nocapture

      - name: Smoke test installer
        run: bash tests/install-script-smoke.sh

  build-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify-release
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: execmanager-linux-x86_64
            binary_name: execmanager
          - os: macos-latest
            artifact_name: execmanager-macos
            binary_name: execmanager

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p execmanager-cli --release

      - name: Copy platform artifact
        run: cp target/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Generate release checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**

name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Reject Rust lint suppressions
        shell: bash
        run: |
          if git grep -nE '#!\[allow\(|#\[allow\(|#\[expect\(' -- '*.rs'; then
            echo 'Rust lint suppressions are not allowed in CI.'
            exit 1
          fi

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Test execmanager-cli
        run: cargo test -p execmanager-cli -- --nocapture

      - name: Test workspace
        run: cargo test --workspace --all-targets -- --nocapture

  build-snapshot:
    needs: build-and-test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: execmanager-linux-x86_64-snapshot
            binary_name: execmanager
          - os: macos-latest
            artifact_name: execmanager-macos-snapshot
            binary_name: execmanager

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build snapshot binary
        run: cargo build -p execmanager-cli --release

      - name: Copy snapshot artifact
        run: cp target/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Reject Rust lint suppressions
        shell: bash
        run: |
          if git grep -nE '#!\[allow\(|#\[allow\(|#!\[expect\(|#\[expect\(' -- '*.rs'; then
            echo 'Rust lint suppressions are not allowed in CI.'
            exit 1
          fi

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Test execmanager-cli
        run: cargo test -p execmanager-cli -- --nocapture

      - name: Test workspace
        run: cargo test --workspace --all-targets -- --nocapture

      - name: Smoke test installer
        run: bash tests/install-script-smoke.sh

  build-snapshot:
    needs: build-and-test
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: execmanager-linux-x86_64-snapshot
            binary_name: execmanager
          - os: macos-latest
            artifact_name: execmanager-macos-snapshot
            binary_name: execmanager

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build snapshot binary
        run: cargo build -p execmanager-cli --release

      - name: Copy snapshot artifact
        run: cp target/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}

      - name: Generate snapshot checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            ${{ matrix.artifact_name }}.sha256

  publish-snapshot-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download snapshot artifacts
        uses: actions/download-artifact@v4
        with:
          path: snapshot-assets
          merge-multiple: true

      - name: Ensure snapshot release exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view snapshot >/dev/null 2>&1; then
            exit 0
          fi

          gh release create snapshot \
            --title "snapshot" \
            --notes "Latest snapshot build from main." \
            --prerelease

      - name: Publish snapshot assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload snapshot snapshot-assets/* --clobber
